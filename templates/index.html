<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Colorization</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top, #1f1f2e, #0d0d14);
        color: #e5e5e5;
    }

    .container {
        max-width: 1000px;
        margin: 60px auto;
        padding: 20px;
    }

    h1 {
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 8px;
    }

    p {
        color: #aaa;
        margin-bottom: 30px;
    }

    .card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(12px);
        padding: 30px;
        border-radius: 14px;
    }

    .upload-box {
        border: 1px dashed rgba(255,255,255,0.2);
        padding: 35px;
        text-align: center;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .upload-box:hover {
        border-color: #7c7cff;
        background: rgba(124,124,255,0.05);
    }

    input[type="file"] {
        display: none;
    }

    button {
        margin-top: 20px;
        background: linear-gradient(90deg, #6a5cff, #8f7cff);
        border: none;
        color: white;
        padding: 12px 22px;
        font-size: 14px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(124,124,255,0.4);
    }

    .grid {
        display: flex;
        gap: 20px;
        margin-top: 30px;
    }

    .image-box {
        flex: 1;
        text-align: center;
    }

    .image-box h3 {
        font-size: 13px;
        color: #aaa;
        margin-bottom: 10px;
    }

    img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .loader {
        display: none;
        margin-top: 15px;
        font-size: 13px;
        color: #bbb;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Image Colorization Tool</h1>
    <p>Convert grayscale image into realistic coloured image using deep learning.</p>

    <div class="card">
        <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

            <label class="upload-box">
                 Click to upload B/W image
                <input type="file" name="image" id="fileInput" required>
            </label>

            <button type="submit">Generate Coloured Image</button>
        </form>

        <div class="loader" id="loader">
            Processing...
        </div>

        <div class="grid">
            <div class="image-box">
                <h3>Input</h3>
                <img id="previewImage" style="display:none;">
            </div>

            {% if result_image %}
            <div class="image-box">
                <h3>Output</h3>
                <img src="{{ result_image }}">
            </div>
            {% endif %}
        </div>
    </div>
</div>

<script>
const input = document.getElementById('fileInput');
const preview = document.getElementById('previewImage');

input.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        preview.style.display = "block";
        preview.src = URL.createObjectURL(file);
    }
});

function showLoader() {
    document.getElementById('loader').style.display = 'block';
}
</script>

</body>
</html>
